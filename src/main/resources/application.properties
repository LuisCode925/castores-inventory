server.port=8090

# Configuracion de JWT
application.security.jwt.secret-key= nIZKqFHDsIJCeNTcfSxWvATyumnKYwlTvewBnFDEBUQNYDMeNK
application.security.jwt.expiration= 86400000
application.security.jwt.refresh-token.expiration= 604800000

# Application Configuration
spring.application.name=inventory

# Datasource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/inventory
spring.datasource.username=inventory_manager
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configuration (update/create-drop)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# SQL Initialization
spring.sql.init.mode=always

# Silenciar las excepciones del Schema Management
# logging.level.root=DEBUG 
logging.level.org.hibernate.tool.schema=ERROR